<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MDC Assessment{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="shield">&#128737;</span>
        Defender for Cloud — Assessment
      </a>
      <span class="local-badge" title="Authentication opens a browser on this machine">Local use only</span>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="wrap foot">
    <span>Microsoft Defender for Cloud assessment tool</span>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
